name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit & UI Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project sbx-ui.xcodeproj \
            -scheme sbx-ui

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project sbx-ui.xcodeproj \
            -scheme sbx-ui \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            2>&1 | xcpretty --color

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project sbx-ui.xcodeproj \
            -scheme sbx-ui \
            -destination 'platform=macOS' \
            -only-testing:sbx-uiTests \
            2>&1 | xcpretty --color --report junit --output test-results/unit-tests.xml

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project sbx-ui.xcodeproj \
            -scheme sbx-ui \
            -destination 'platform=macOS' \
            -only-testing:sbx-uiUITests \
            2>&1 | xcpretty --color --report junit --output test-results/ui-tests.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
