name: Build

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Installable Apps
    runs-on: macos-26

    strategy:
      matrix:
        channel: [canary, beta, stable]
        include:
          - channel: canary
            scheme: sbx-ui Canary
            config: Release (Canary)
            app_name: sbx-ui Canary
          - channel: beta
            scheme: sbx-ui Beta
            config: Release (Beta)
            app_name: sbx-ui Beta
          - channel: stable
            scheme: sbx-ui
            config: Release (Stable)
            app_name: sbx-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project sbx-ui.xcodeproj \
            -scheme "${{ matrix.scheme }}"

      - name: Build release archive
        run: |
          xcodebuild archive \
            -project sbx-ui.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -configuration "${{ matrix.config }}" \
            -destination 'generic/platform=macOS' \
            -archivePath "${{ runner.temp }}/${{ matrix.app_name }}.xcarchive" \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        run: |
          mkdir -p "${{ runner.temp }}/export"
          cp -R "${{ runner.temp }}/${{ matrix.app_name }}.xcarchive/Products/Applications/${{ matrix.app_name }}.app" \
            "${{ runner.temp }}/export/"

      - name: Create DMG
        run: |
          hdiutil create -volname "${{ matrix.app_name }}" \
            -srcfolder "${{ runner.temp }}/export" \
            -ov -format UDZO \
            "${{ runner.temp }}/${{ matrix.app_name }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_name }}.dmg
          path: ${{ runner.temp }}/${{ matrix.app_name }}.dmg

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_name }}.app
          path: ${{ runner.temp }}/export/${{ matrix.app_name }}.app
